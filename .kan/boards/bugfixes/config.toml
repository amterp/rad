default_column = "todo-lo"
id = "b_sBGk8Gtk"
kan_schema = "board/10"
name = "bugfixes"

[card_display]
  badges = ["tags", "grammar"]
  type_indicator = "severity"

[[columns]]
  color = "#6b7280"
  description = "Low priority bugs to fix eventually"
  limit = 0
  name = "todo-lo"

[[columns]]
  color = "#ef4444"
  description = "High priority bugs to fix soon"
  limit = 0
  name = "todo-hi"

[[columns]]
  color = "#f59e0b"
  description = "Bugs currently being worked on"
  limit = 0
  name = "in-progress"

[[columns]]
  color = "#10b981"
  description = "Fixed and verified"
  limit = 0
  name = "done"

[custom_fields]
  [custom_fields.grammar]
    description = "Whether this bug requires grammar/parser changes to fix"
    type = "boolean"
  [custom_fields.severity]
    description = "How severe the bug is"
    type = "enum"
    wanted = true

    [[custom_fields.severity.options]]
      color = "#dc2626"
      description = "Blocks core functionality or causes data loss"
      value = "critical"

    [[custom_fields.severity.options]]
      color = "#f97316"
      description = "Significant impact but has workarounds"
      value = "high"

    [[custom_fields.severity.options]]
      color = "#eab308"
      description = "Noticeable issue with limited impact"
      value = "medium"

    [[custom_fields.severity.options]]
      color = "#6b7280"
      description = "Minor issue, cosmetic or edge case"
      value = "low"
  [custom_fields.tags]
    description = "Card tags"
    type = "enum-set"

    [[custom_fields.tags.options]]
      color = "#8b5cf6"
      description = "Requires language design thinking"
      value = "design"
