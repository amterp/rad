default_column = "uncommitted"
id = "3d0a0ABE"
kan_schema = "board/10"
name = "main"

[card_display]
  badges = ["labels"]
  type_indicator = "type"

[[columns]]
  color = "#6b7280"
  description = "Ideas and thoughts not yet committed to"
  limit = 0
  name = "uncommitted"

[[columns]]
  color = "#94a3b8"
  description = "Low priority planned work"
  limit = 0
  name = "low"

[[columns]]
  color = "#f59e0b"
  description = "High priority planned work"
  limit = 10
  name = "high"

[[columns]]
  color = "#3b82f6"
  description = "Ready to be picked up next"
  limit = 10
  name = "next"

[[columns]]
  color = "#ec4899"
  description = "Currently being worked on"
  limit = 5
  name = "in-progress"

[[columns]]
  color = "#9333ea"
  description = "Completed work"
  limit = 0
  name = "done"

[custom_fields]
  [custom_fields.labels]
    description = "AI suitability and release impact labels"
    type = "enum-set"

    [[custom_fields.labels.options]]
      description = "Well-suited for autonomous AI work - low complexity, AI can handle independently"
      value = "ai-hi"

    [[custom_fields.labels.options]]
      description = "Likely suitable for AI but may need some human oversight"
      value = "ai-lo"

    [[custom_fields.labels.options]]
      description = "Long-running AI task - exploratory, research, or experimental work to kick off and review later"
      value = "ai-think"

    [[custom_fields.labels.options]]
      description = "Would be a breaking change if implemented"
      value = "breaking"
  [custom_fields.type]
    description = "The category of work this card represents"
    type = "enum"
    wanted = true

    [[custom_fields.type.options]]
      color = "#dc2626"
      description = "A defect in existing functionality"
      value = "bug"

    [[custom_fields.type.options]]
      color = "#4b5563"
      description = "Maintenance, refactoring, or housekeeping"
      value = "chore"

    [[custom_fields.type.options]]
      color = "#2563eb"
      description = "An improvement to existing functionality"
      value = "enhancement"

    [[custom_fields.type.options]]
      color = "#9333ea"
      description = "A large body of work spanning multiple cards"
      value = "epic"

    [[custom_fields.type.options]]
      color = "#06b6d4"
      description = "Software craftsmanship and quality improvements"
      value = "excellence"

    [[custom_fields.type.options]]
      color = "#16a34a"
      description = "New functionality to be added"
      value = "feature"

[[link_rules]]
  name = "github"
  pattern = "#(\\d{2,})"
  url = "https://github.com/amterp/rad/issues/{1}"

[[pattern_hooks]]
  command = ".kan/hooks/type-shortcut.rad"
  name = "type-shortcut"
  pattern_title = "![a-zA-Z]+"
  timeout = 0
